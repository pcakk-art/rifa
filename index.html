<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    // ============ CONFIGURACIÓN DE GOOGLE APPS SCRIPT ============
    // >>>>>> ¡¡¡ PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT !!! <<<<<<
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVqstYyQIS3SBTCybcJCJB1FlIYSgkchktFa9GsyF30kIaRn1xURqAmvPB80iGNK338g/exec'; // <-- CÁMBIALA
    
    // ============ VARIABLES GLOBALES ============
    let sales = [];
    let totalNumbers = 100;
    let selectedNumbers = new Set();
    let cargandoDatos = true; // Para evitar acciones mientras se carga

    // ============ INICIALIZACIÓN ============
    document.addEventListener('DOMContentLoaded', async function() {
        console.log('🚀 Inicializando sistema con Google Sheets...');
        await cargarDatosDesdeGoogleSheets();
        
        document.getElementById('totalNumbers').value = totalNumbers;
        
        // Forzar actualización de todos los componentes
        actualizarGrid();
        renderSales();
        actualizarEstadisticas();
        actualizarTags();
    });

    // ============ FUNCIONES PARA GOOGLE SHEETS ============
    async function cargarDatosDesdeGoogleSheets() {
        try {
            cargandoDatos = true;
            console.log('📥 Cargando datos desde Google Sheets...');
            
            const response = await fetch(`${APPS_SCRIPT_URL}?accion=obtenerTodo`);
            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error);
            }
            
            sales = data.ventas || [];
            totalNumbers = data.totalNumbers || 100;
            
            // Actualizar localStorage como respaldo/offline (opcional)
            localStorage.setItem('raffleSales', JSON.stringify(sales));
            localStorage.setItem('totalNumbers', totalNumbers);
            
            console.log('✅ Datos cargados:', { sales: sales.length, totalNumbers });
            
        } catch (error) {
            console.error('❌ Error cargando datos:', error);
            
            // Fallback a localStorage si hay error de conexión
            console.log('⚠️ Usando datos de respaldo (localStorage)');
            sales = JSON.parse(localStorage.getItem('raffleSales')) || [];
            totalNumbers = parseInt(localStorage.getItem('totalNumbers')) || 100;
            
            alert('No se pudo conectar con Google Sheets. Usando datos locales. Verifica tu URL de Apps Script.');
        } finally {
            cargandoDatos = false;
        }
    }

    async function guardarTodoEnGoogleSheets() {
        if (cargandoDatos) {
            console.log('⏳ Espere, aún cargando datos...');
            return false;
        }
        
        try {
            console.log('☁️ Guardando datos en Google Sheets...');
            
            // Guardar ventas
            const responseVentas = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Importante para evitar problemas de CORS
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    accion: 'guardarVentas',
                    ventas: sales
                })
            });
            
            // Guardar configuración
            const responseConfig = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    accion: 'guardarConfig',
                    totalNumbers: totalNumbers
                })
            });
            
            console.log('✅ Datos guardados en Google Sheets');
            
            // También guardar en localStorage como respaldo
            localStorage.setItem('raffleSales', JSON.stringify(sales));
            localStorage.setItem('totalNumbers', totalNumbers);
            
            return true;
            
        } catch (error) {
            console.error('❌ Error guardando en Google Sheets:', error);
            alert('Error al guardar en la nube. Los datos se guardaron localmente pero no se sincronizarán.');
            
            // Guardar al menos en localStorage
            localStorage.setItem('raffleSales', JSON.stringify(sales));
            localStorage.setItem('totalNumbers', totalNumbers);
            
            return false;
        }
    }

    // ============ FUNCIÓN PARA AGREGAR NÚMEROS ============
    function addNumbersFromInput() {
        console.log('🔢 Procesando números...');
        
        const input = document.getElementById('numbersInput').value.trim();
        
        if (!input) {
            alert('⚠️ Por favor ingrese algunos números');
            return;
        }

        const numerosAgregados = [];
        const numerosInvalidos = [];
        const numerosVendidos = [];

        const partes = input.split(',').map(p => p.trim()).filter(p => p.length > 0);

        partes.forEach(parte => {
            if (parte.includes('-')) {
                const rango = parte.split('-').map(n => parseInt(n.trim()));
                
                if (rango.length === 2 && !isNaN(rango[0]) && !isNaN(rango[1])) {
                    const inicio = Math.min(rango[0], rango[1]);
                    const fin = Math.max(rango[0], rango[1]);
                    
                    for (let i = inicio; i <= fin; i++) {
                        if (i >= 1 && i <= totalNumbers) {
                            numerosAgregados.push(i);
                        } else {
                            numerosInvalidos.push(i);
                        }
                    }
                } else {
                    numerosInvalidos.push(parte);
                }
            } else {
                const num = parseInt(parte);
                
                if (!isNaN(num) && num >= 1 && num <= totalNumbers) {
                    numerosAgregados.push(num);
                } else {
                    numerosInvalidos.push(parte);
                }
            }
        });

        numerosAgregados.forEach(num => {
            if (sales.some(s => s.numbers.includes(num))) {
                numerosVendidos.push(num);
            } else {
                selectedNumbers.add(num);
            }
        });

        if (numerosInvalidos.length > 0) {
            alert(`⚠️ Números inválidos o fuera de rango: ${numerosInvalidos.join(', ')}`);
        }

        if (numerosVendidos.length > 0) {
            alert(`❌ Los siguientes números ya están vendidos: ${numerosVendidos.join(', ')}`);
        }

        actualizarGrid();
        actualizarTags();
        document.getElementById('selectedCount').textContent = selectedNumbers.size;
        document.getElementById('numbersInput').value = '';
    }

    // ============ FUNCIÓN PRINCIPAL: ACTUALIZAR GRID ============
    function actualizarGrid() {
        console.log('🎯 Actualizando grid...');
        
        const grid = document.getElementById('numbersGrid');
        if (!grid) {
            console.error('❌ Grid no encontrado');
            return;
        }
        
        let html = '';
        
        for (let i = 1; i <= totalNumbers; i++) {
            const estaVendido = sales.some(s => s.numbers.includes(i));
            
            if (estaVendido) {
                html += `<div class="number-box sold" title="Vendido">${i}</div>`;
            } else {
                html += `<div class="number-box available" title="Disponible">${i}</div>`;
            }
        }
        
        grid.innerHTML = html;
        actualizarContadores();
    }

    // ============ ACTUALIZAR TAGS ============
    function actualizarTags() {
        const tags = document.getElementById('selectedNumbersTags');
        const noNumbers = document.getElementById('noNumbersSelected');
        
        if (!tags || !noNumbers) return;
        
        tags.innerHTML = '';
        
        if (selectedNumbers.size === 0) {
            noNumbers.style.display = 'block';
            return;
        }
        
        noNumbers.style.display = 'none';
        
        Array.from(selectedNumbers).sort((a, b) => a - b).forEach(num => {
            const tag = document.createElement('span');
            tag.className = 'number-tag';
            tag.innerHTML = `${num} <button onclick="eliminarTag(${num})">×</button>`;
            tags.appendChild(tag);
        });
    }

    function eliminarTag(num) {
        console.log('🗑️ Eliminando número:', num);
        selectedNumbers.delete(num);
        actualizarGrid();
        actualizarTags();
        document.getElementById('selectedCount').textContent = selectedNumbers.size;
    }

    function clearNumberSelection() {
        console.log('🧹 Limpiando selección');
        selectedNumbers.clear();
        actualizarGrid();
        actualizarTags();
        document.getElementById('selectedCount').textContent = '0';
        document.getElementById('numbersInput').value = '';
    }

    // ============ GUARDAR VENTA ============
    async function saveSale() {
        console.log('💾 Guardando venta...');
        
        if (cargandoDatos) {
            alert('⏳ Espere, aún cargando datos...');
            return;
        }
        
        const name = document.getElementById('name').value.trim();
        const nick = document.getElementById('nick').value.trim() || '-';
        const contact = document.getElementById('contact').value.trim();
        const seller = document.getElementById('seller').value.trim();
        const editId = document.getElementById('editId').value;

        if (!name) {
            alert('⚠️ Por favor ingrese el nombre');
            return;
        }
        
        if (!contact) {
            alert('⚠️ Por favor ingrese el número de contacto');
            return;
        }
        
        if (!seller) {
            alert('⚠️ Por favor ingrese quién vendió');
            return;
        }

        if (selectedNumbers.size === 0) {
            alert('⚠️ Seleccione al menos un número usando el campo de entrada');
            return;
        }

        for (let num of selectedNumbers) {
            if (sales.some(s => s.numbers.includes(num) && s.id !== editId)) {
                alert(`❌ El número ${num} ya está vendido`);
                return;
            }
        }

        const saleData = {
            id: editId || Date.now().toString(),
            name: name,
            nick: nick,
            numbers: Array.from(selectedNumbers),
            contact: contact,
            seller: seller,
            date: new Date().toISOString()
        };

        if (editId) {
            const index = sales.findIndex(s => s.id === editId);
            if (index !== -1) {
                sales[index] = saleData;
            }
            console.log('✏️ Venta actualizada:', saleData);
        } else {
            sales.push(saleData);
            console.log('➕ Nueva venta agregada:', saleData);
        }

        // Guardar en Google Sheets
        const guardadoExitoso = await guardarTodoEnGoogleSheets();
        
        // Limpiar formulario
        document.getElementById('name').value = '';
        document.getElementById('nick').value = '';
        document.getElementById('contact').value = '';
        document.getElementById('seller').value = '';
        document.getElementById('numbersInput').value = '';
        document.getElementById('editId').value = '';
        document.getElementById('formTitle').textContent = '➕ Agregar nueva venta';
        document.getElementById('cancelBtn').style.display = 'none';
        
        selectedNumbers.clear();
        
        actualizarGrid();
        renderSales();
        actualizarEstadisticas();
        actualizarTags();
        document.getElementById('selectedCount').textContent = '0';
        
        if (guardadoExitoso) {
            alert('✅ Venta guardada correctamente en la nube');
        } else {
            alert('⚠️ Venta guardada localmente. No se pudo sincronizar con la nube.');
        }
    }

    // ============ EDITAR VENTA ============
    function editSale(id) {
        console.log('✏️ Editando venta:', id);
        
        const sale = sales.find(s => s.id === id);
        if (!sale) return;
        
        document.getElementById('editId').value = sale.id;
        document.getElementById('name').value = sale.name;
        document.getElementById('nick').value = sale.nick === '-' ? '' : sale.nick;
        document.getElementById('contact').value = sale.contact;
        document.getElementById('seller').value = sale.seller;
        document.getElementById('formTitle').textContent = '✏️ Editando venta';
        document.getElementById('cancelBtn').style.display = 'inline-block';
        
        selectedNumbers = new Set(sale.numbers);
        actualizarGrid();
        actualizarTags();
        document.getElementById('selectedCount').textContent = selectedNumbers.size;
    }

    function cancelEdit() {
        console.log('❌ Cancelando edición');
        
        document.getElementById('editId').value = '';
        document.getElementById('formTitle').textContent = '➕ Agregar nueva venta';
        document.getElementById('cancelBtn').style.display = 'none';
        document.getElementById('name').value = '';
        document.getElementById('nick').value = '';
        document.getElementById('contact').value = '';
        document.getElementById('seller').value = '';
        document.getElementById('numbersInput').value = '';
        
        selectedNumbers.clear();
        actualizarGrid();
        actualizarTags();
        document.getElementById('selectedCount').textContent = '0';
    }

    async function deleteSale(id) {
        if (!confirm('¿Está seguro de eliminar esta venta?')) return;
        
        console.log('🗑️ Eliminando venta:', id);
        
        sales = sales.filter(s => s.id !== id);
        
        // Guardar en Google Sheets
        const guardadoExitoso = await guardarTodoEnGoogleSheets();
        
        if (document.getElementById('editId').value === id) {
            cancelEdit();
        }
        
        actualizarGrid();
        renderSales();
        actualizarEstadisticas();
        
        if (guardadoExitoso) {
            alert('✅ Venta eliminada de la nube');
        } else {
            alert('⚠️ Venta eliminada localmente. No se pudo sincronizar con la nube.');
        }
    }

    // ============ ACTUALIZAR CONFIGURACIÓN ============
    async function updateRaffleConfig() {
        console.log('⚙️ Actualizando configuración...');
        
        if (cargandoDatos) {
            alert('⏳ Espere, aún cargando datos...');
            return;
        }
        
        const newTotal = parseInt(document.getElementById('totalNumbers').value);
        
        if (!newTotal || newTotal < 1) {
            alert('⚠️ Ingrese un número válido');
            return;
        }
        
        const totalSold = sales.reduce((sum, s) => sum + s.numbers.length, 0);
        
        if (newTotal < totalSold) {
            alert(`❌ Ya hay ${totalSold} números vendidos. No puede reducir a menos de esa cantidad.`);
            document.getElementById('totalNumbers').value = totalNumbers;
            return;
        }
        
        totalNumbers = newTotal;
        
        sales.forEach(s => {
            s.numbers = s.numbers.filter(n => n <= totalNumbers);
        });
        
        const nuevosSeleccionados = new Set();
        selectedNumbers.forEach(num => {
            if (num <= totalNumbers) nuevosSeleccionados.add(num);
        });
        selectedNumbers = nuevosSeleccionados;
        
        // Guardar en Google Sheets
        const guardadoExitoso = await guardarTodoEnGoogleSheets();
        
        actualizarGrid();
        renderSales();
        actualizarEstadisticas();
        actualizarTags();
        document.getElementById('selectedCount').textContent = selectedNumbers.size;
        
        if (guardadoExitoso) {
            alert('✅ Configuración actualizada en la nube');
        } else {
            alert('⚠️ Configuración actualizada localmente. No se pudo sincronizar con la nube.');
        }
    }

    // ============ RENDERIZAR TABLA ============
    function renderSales() {
        console.log('📋 Renderizando tabla...');
        
        const tbody = document.getElementById('salesTable');
        tbody.innerHTML = '';
        
        sales.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        sales.forEach(sale => {
            const row = tbody.insertRow();
            row.innerHTML = `
                <td>${sale.name}</td>
                <td>${sale.nick}</td>
                <td>${sale.numbers.sort((a, b) => a - b).join(', ')}</td>
                <td>${sale.contact}</td>
                <td>${sale.seller}</td>
                <td class="action-buttons">
                    <button class="edit-btn" onclick="editSale('${sale.id}')">Editar</button>
                    <button class="delete-btn" onclick="deleteSale('${sale.id}')">Eliminar</button>
                </td>
            `;
        });
    }

    // ============ ACTUALIZAR ESTADÍSTICAS ============
    function actualizarEstadisticas() {
        const totalSold = sales.reduce((sum, s) => sum + s.numbers.length, 0);
        const available = totalNumbers - totalSold;
        const totalBuyers = sales.length;
        
        document.getElementById('totalSold').textContent = totalSold;
        document.getElementById('availableNumbers').textContent = available;
        document.getElementById('totalBuyers').textContent = totalBuyers;
    }

    function actualizarContadores() {
        const totalSold = sales.reduce((sum, s) => sum + s.numbers.length, 0);
        const available = totalNumbers - totalSold;
        
        document.getElementById('soldCount').textContent = totalSold;
        document.getElementById('availableCount').textContent = available;
    }

    // ============ GUARDAR IMAGEN ============
    function saveVisualizationAsImage() {
        console.log('📸 Guardando imagen...');
        
        const imageGrid = document.getElementById('imageGrid');
        if (!imageGrid) {
            alert('Error: No se encontró el contenedor de la imagen');
            return;
        }
        
        let html = '';
        for (let i = 1; i <= totalNumbers; i++) {
            const estaVendido = sales.some(s => s.numbers.includes(i));
            
            if (estaVendido) {
                html += `<div style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #f56565; color: white; border-radius: 8px; font-weight: bold; border: 2px solid #c53030;">${i}</div>`;
            } else {
                html += `<div style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #48bb78; color: white; border-radius: 8px; font-weight: bold; border: 2px solid #2f855a;">${i}</div>`;
            }
        }
        imageGrid.innerHTML = html;
        
        const totalSold = sales.reduce((sum, s) => sum + s.numbers.length, 0);
        const available = totalNumbers - totalSold;
        document.getElementById('imageSoldCount').textContent = totalSold;
        document.getElementById('imageAvailableCount').textContent = available;
        
        const fecha = new Date().toLocaleDateString('es-ES', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        document.getElementById('imageDate').textContent = fecha;
        
        setTimeout(() => {
            const element = document.getElementById('imageContainer');
            
            html2canvas(element, {
                scale: 2,
                backgroundColor: '#ffffff',
                logging: false,
                windowWidth: 1000,
                allowTaint: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                const fechaArchivo = new Date().toISOString().split('T')[0];
                link.download = `rifa-resumen-${fechaArchivo}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                console.log('✅ Imagen guardada correctamente');
            }).catch(error => {
                console.error('❌ Error al guardar imagen:', error);
                alert('Error al generar la imagen. Por favor intente de nuevo.');
            });
        }, 100);
    }
</script>
